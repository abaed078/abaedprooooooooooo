kind = "web"
previewPath = "/"
title = "Autel MaxiSYS MS Ultra S2"
version = "1.0.0"
id = "artifacts/autel-maxisys"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 20055

[services.development]
run = "pnpm --filter @workspace/autel-maxisys run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/autel-maxisys", "run", "build" ]
publicDir = "artifacts/autel-maxisys/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "20055"
BASE_PATH = "/"
